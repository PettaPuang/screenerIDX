name: SR Screener

on:
  schedule:
    # Minggu 22:00 WITA — refresh watchlist mingguan (paksa rebuild) + sinyal Senin
    # (data close Jumat). Sen–Kam 22:00 WITA — sinyal harian untuk besok.
    - cron: "0 22 * * 0"
      timezone: "Asia/Makassar"
    - cron: "0 22 * * 1-4"
      timezone: "Asia/Makassar"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Compute watchlist cache key
        run: echo "WATCHLIST_WEEK=$(date -u +'%G-%V')" >> "$GITHUB_ENV"
      - name: Restore weekly watchlist
        id: watchlist-cache
        uses: actions/cache/restore@v5
        with:
          path: data/watchlist.generated.json
          key: watchlist-${{ env.WATCHLIST_WEEK }}
      - name: Rebuild weekly watchlist (Minggu)
        if: github.event.schedule == '0 22 * * 0'
        run: npm run weekly
      - name: Ensure weekly watchlist (Sen–Kam)
        if: github.event.schedule != '0 22 * * 0'
        run: npm run weekly:ensure
      - name: Save weekly watchlist
        if: steps.watchlist-cache.outputs.cache-hit != 'true' || github.event.schedule == '0 22 * * 0'
        uses: actions/cache/save@v5
        with:
          path: data/watchlist.generated.json
          key: watchlist-${{ env.WATCHLIST_WEEK }}
      - name: Restore signal state (cooldown)
        uses: actions/cache/restore@v5
        with:
          path: data/signal-state.json
          key: signal-state-${{ github.run_id }}
          restore-keys: |
            signal-state-
      - run: npm start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
      - name: Save signal state (cooldown)
        uses: actions/cache/save@v5
        with:
          path: data/signal-state.json
          key: signal-state-${{ github.run_id }}
