name: SR Screener

on:
  schedule:
    - cron: "30 0 * * 1"
    - cron: "0 1 * * 1-5"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Compute watchlist cache key
        run: echo "WATCHLIST_WEEK=$(date -u +'%G-%V')" >> "$GITHUB_ENV"
      - name: Restore weekly watchlist
        id: watchlist-cache
        uses: actions/cache/restore@v5
        with:
          path: data/watchlist.generated.json
          key: watchlist-${{ env.WATCHLIST_WEEK }}
      - run: npm run weekly:ensure
      - name: Save weekly watchlist
        if: steps.watchlist-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: data/watchlist.generated.json
          key: watchlist-${{ env.WATCHLIST_WEEK }}
      - name: Restore signal state (cooldown)
        if: github.event.schedule != '30 0 * * 1'
        uses: actions/cache/restore@v5
        with:
          path: data/signal-state.json
          key: signal-state-${{ github.run_id }}
          restore-keys: |
            signal-state-
      - run: npm start
        if: github.event.schedule != '30 0 * * 1'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
      - name: Save signal state (cooldown)
        if: github.event.schedule != '30 0 * * 1'
        uses: actions/cache/save@v5
        with:
          path: data/signal-state.json
          key: signal-state-${{ github.run_id }}
